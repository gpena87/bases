<h1>Dragon Ball Page</h1>
<hr/>
<section class="row">
  <div class="col-12 col-sm-6">
    <h3>Agregar: {{name()}}</h3>
    <input
    type="text"
    class="form-control"
    placeholder="Nombre"
    [value]="name()"
    (change)="name.set($event.target.value)"
    (input)="name.set($event.target.value)"
    />
    <h3>Agregar: {{power()}}</h3>
    <input
    type="number"
    class="form-control mt-2"
    placeholder="Poder"
    [value]="power()"
    (change)="power.set(+txtPower.value)"
    (input)="power.set(+txtPower.value)"
    #txtPower
    />
    <button (click)="addCharacter()" class="btn btn-primary mt-2">Agregar</button>
  </div>

  <div class="col-12 col-sm-6">
    <h3>Listado Fuertes</h3>
    <ul>
      @for (character of characters(); track character.id; let idx = $index) {
        @if(character.power > 500) {
          <li>
            <span>{{idx + 1}} - {{character.name}}</span>
            <strong [class.text-danger]="character.power > 9000" [class.text-info]="character.power < 9000">({{character.power}})</strong>
          </li>
        }@else{
          <li>
            <strong>Aqui no hay nada</strong>
          </li>
        }
      }
    </ul>
  </div>
</section>
