<h3>Agregar: {{name()}}</h3>
<input
  type="text"
  class="form-control"
  placeholder="Nombre"
  [value]="name()"
  (change)="name.set($event.target.value)"
  (input)="name.set($event.target.value)"
/>
<h3>Agregar: {{power()}}</h3>
<input
  type="number"
  class="form-control mt-2"
  placeholder="Poder"
  [value]="power()"
  (change)="power.set(+txtPower.value)"
  (input)="power.set(+txtPower.value)"
  #txtPower
/>
<button (click)="addCharacter()" class="btn btn-primary mt-2">Agregar</button>
